name: Competency Descriptors

on:
  push:
    paths:
      - 'competencies/**'
      - 'competencies.yaml'
      - 'scripts/check_competency_descriptors.py'
      - 'scripts/import_competency_descriptors.py'
  pull_request:
    paths:
      - 'competencies/**'
      - 'competencies.yaml'
      - 'scripts/check_competency_descriptors.py'
      - 'scripts/import_competency_descriptors.py'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Check descriptors are in sync with the framework
        run: python scripts/check_competency_descriptors.py
