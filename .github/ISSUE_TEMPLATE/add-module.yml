name: Propose a course
description: Suggest a new LTC course idea (intake only — not yet in production)
title: "[Proposal] <course title>"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Use this to **propose** a course idea. A maintainer triages it, adds it to the
        **LTC Training Modules** board, and sets its fields. When work actually starts, the
        maintainer converts it into a **Course production tracker** (or opens one from that
        template) to run the 8-stage pipeline — see
        [process/PROCESS.md](https://github.com/dhigby/virtual-ltct/blob/main/process/PROCESS.md).
        Add a `competency: …` label for each competency the course develops.
  - type: input
    id: title
    attributes:
      label: Course title
      placeholder: e.g. Introduction to Paratext
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What will this module teach?
      placeholder: One or two sentences.
    validations:
      required: true
  - type: input
    id: competencies
    attributes:
      label: Competencies developed
      description: List names exactly as in competencies.yaml (comma-separated).
      placeholder: e.g. Translation Tools, Adult Education
    validations:
      required: true
  - type: input
    id: folder
    attributes:
      label: Module folder (if content already drafted)
      placeholder: modules/<slug>/README.md
