name: Coverage

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'competencies.yaml'
      - 'scripts/gen_coverage.py'

permissions:
  contents: write

concurrency:
  group: coverage
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Regenerate COVERAGE.md
        run: python scripts/gen_coverage.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- COVERAGE.md; then
            echo "COVERAGE.md unchanged"; exit 0
          fi
          git add COVERAGE.md
          git commit -m "chore: regenerate COVERAGE.md [skip ci]"
          git push
